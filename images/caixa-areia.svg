<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <!-- Fundo -->
  <rect width="300" height="200" fill="#f5f0ff"/>

  <!-- Corpo da caixa fechada -->
  <rect x="60" y="70" width="180" height="100" rx="8" fill="#5570cc"/>
  <!-- Tampa -->
  <rect x="60" y="55" width="180" height="20" rx="6" fill="#4460bb"/>
  <!-- Detalhe lateral direito -->
  <rect x="220" y="70" width="20" height="100" rx="0 8 8 0" fill="#3a50aa"/>

  <!-- Porta da entrada -->
  <ellipse cx="110" cy="120" rx="28" ry="32" fill="#3a50aa"/>
  <ellipse cx="110" cy="120" rx="22" ry="26" fill="#2a3a88"/>
  <!-- arco da porta -->
  <path d="M88 120 Q110 88, 132 120" fill="#2a3a88"/>

  <!-- Alça da tampa -->
  <rect x="135" y="45" width="30" height="12" rx="6" fill="#6680dd"/>

  <!-- Grãos de areia (pontos) -->
  <circle cx="165" cy="100" r="3" fill="#d4c080" opacity="0.7"/>
  <circle cx="178" cy="115" r="2.5" fill="#d4c080" opacity="0.7"/>
  <circle cx="190" cy="105" r="3" fill="#d4c080" opacity="0.7"/>
  <circle cx="170" cy="130" r="2" fill="#d4c080" opacity="0.7"/>
  <circle cx="200" cy="125" r="3" fill="#d4c080" opacity="0.7"/>
  <circle cx="185" cy="140" r="2.5" fill="#d4c080" opacity="0.7"/>

  <!-- Label -->
  <text x="150" y="185" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#4460bb" text-anchor="middle">Caixa de Areia Fechada</text>
</svg>
