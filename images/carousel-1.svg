<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <rect width="1200" height="420" fill="#1a3a6b"/>
  <!-- Patinha estilizada em amarelo à direita -->
  <g fill="#f5c842" transform="translate(880, 120)">
    <!-- Palma -->
    <ellipse cx="80" cy="130" rx="55" ry="65"/>
    <!-- Dedos -->
    <ellipse cx="25" cy="65" rx="22" ry="30" transform="rotate(-15, 25, 65)"/>
    <ellipse cx="65" cy="45" rx="22" ry="30"/>
    <ellipse cx="108" cy="50" rx="22" ry="30" transform="rotate(10, 108, 50)"/>
    <ellipse cx="145" cy="75" rx="20" ry="28" transform="rotate(20, 145, 75)"/>
  </g>
  <!-- Texto principal -->
  <text x="600" y="180" font-family="Arial, sans-serif" font-size="56" font-weight="bold"
        fill="#ffffff" text-anchor="middle">Snow e Zoey Petshop</text>
  <!-- Subtítulo -->
  <text x="600" y="250" font-family="Arial, sans-serif" font-size="28"
        fill="#f5c842" text-anchor="middle">Cuidando do seu pet com amor</text>
</svg>
