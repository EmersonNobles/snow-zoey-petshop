<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <rect width="1200" height="420" fill="#4a1a7a"/>
  <!-- Ícone tesoura à esquerda -->
  <g fill="#ffffff" transform="translate(120, 130)">
    <circle cx="30" cy="30" r="22" fill="none" stroke="#ffffff" stroke-width="8"/>
    <circle cx="90" cy="30" r="22" fill="none" stroke="#ffffff" stroke-width="8"/>
    <line x1="46" y1="43" x2="160" y2="130" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
    <line x1="74" y1="43" x2="160" y2="130" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
  </g>
  <!-- Texto principal -->
  <text x="650" y="175" font-family="Arial, sans-serif" font-size="52" font-weight="bold"
        fill="#ffffff" text-anchor="middle">Banho, Tosa e Muito Mais!</text>
  <!-- Subtítulo em amarelo -->
  <text x="650" y="250" font-family="Arial, sans-serif" font-size="30"
        fill="#f5e88a" text-anchor="middle">Agende agora o serviço do seu pet</text>
</svg>
