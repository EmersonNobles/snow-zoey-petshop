<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <!-- Fundo -->
  <rect width="300" height="200" fill="#fffaf0"/>

  <!-- Base da gaiola -->
  <rect x="70" y="160" width="160" height="15" rx="4" fill="#8B6914"/>
  <!-- Pezinhos -->
  <rect x="85" y="172" width="10" height="18" rx="3" fill="#8B6914"/>
  <rect x="205" y="172" width="10" height="18" rx="3" fill="#8B6914"/>

  <!-- Corpo da gaiola (arco) -->
  <path d="M80 160 Q80 30, 150 20 Q220 30, 220 160 Z" fill="none" stroke="#b8860b" stroke-width="3"/>

  <!-- Barras verticais -->
  <line x1="100" y1="40" x2="100" y2="160" stroke="#b8860b" stroke-width="2.5"/>
  <line x1="120" y1="28" x2="120" y2="160" stroke="#b8860b" stroke-width="2.5"/>
  <line x1="140" y1="22" x2="140" y2="160" stroke="#b8860b" stroke-width="2.5"/>
  <line x1="160" y1="22" x2="160" y2="160" stroke="#b8860b" stroke-width="2.5"/>
  <line x1="180" y1="28" x2="180" y2="160" stroke="#b8860b" stroke-width="2.5"/>
  <line x1="200" y1="40" x2="200" y2="160" stroke="#b8860b" stroke-width="2.5"/>

  <!-- Barras horizontais -->
  <path d="M85 70 Q150 55, 215 70" fill="none" stroke="#b8860b" stroke-width="2"/>
  <path d="M78 110 Q150 95, 222 110" fill="none" stroke="#b8860b" stroke-width="2"/>

  <!-- Poleiro -->
  <rect x="105" y="115" width="90" height="6" rx="3" fill="#8B6914"/>
  <line x1="135" y1="115" x2="135" y2="160" stroke="#8B6914" stroke-width="2.5"/>
  <line x1="165" y1="115" x2="165" y2="160" stroke="#8B6914" stroke-width="2.5"/>

  <!-- Pássaro no poleiro -->
  <ellipse cx="150" cy="105" rx="12" ry="9" fill="#22aa44"/>
  <circle cx="160" cy="98" rx="8" ry="7" fill="#22aa44"/>
  <polygon points="167,98 174,96 167,102" fill="#e8a000"/>
  <!-- olho -->
  <circle cx="162" cy="96" r="2" fill="#ffffff"/>
  <circle cx="163" cy="96" r="1" fill="#222222"/>
  <!-- asa -->
  <path d="M139 106 Q130 98, 135 93" stroke="#1a8a34" stroke-width="2.5" fill="none"/>

  <!-- Comedouro -->
  <rect x="185" y="130" width="20" height="12" rx="3" fill="#e0c060"/>
  <rect x="187" y="128" width="16" height="5" rx="2" fill="#c0a040"/>

  <!-- Topo da gaiola -->
  <circle cx="150" cy="18" r="7" fill="#b8860b"/>
  <line x1="150" y1="11" x2="150" y2="0" stroke="#b8860b" stroke-width="2.5"/>
  <circle cx="150" cy="0" r="4" fill="#b8860b"/>

  <!-- Label -->
  <text x="150" y="198" font-family="Arial, sans-serif" font-size="9" fill="#888888" text-anchor="middle">Gaiola Decorativa com Poleiro</text>
</svg>
